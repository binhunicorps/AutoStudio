<!-- PAGE: Settings -->
<section id="page-settings" class="page">
    <div class="settings-box">
        <div class="panel" style="height:100%;">
            <h2 class="panel-title">⚙ Cấu Hình API</h2>
            <label class="field-label">Endpoint</label>
            <input id="cfg-endpoint" class="inp" type="text" placeholder="http://localhost:8317/">

            <label class="field-label">API Key</label>
            <div class="input-group">
                <input id="cfg-apikey" class="inp" type="password" placeholder="API key...">
                <button class="btn sm" onclick="toggleApiKeyVisibility()" title="Show/Hide">👁</button>
            </div>

            <div class="btn-row" style="margin-top:16px;">
                <button class="btn primary" onclick="saveSettings()">💾 Lưu & Kiểm Tra</button>
            </div>

            <div id="settings-status" class="status-msg"></div>

            <h3 class="section-title">Models</h3>
            <div id="model-list" class="model-list">
                <div class="muted">Nhấn "Lưu & Kiểm Tra" để kiểm tra models</div>
            </div>

            <h3 class="section-title" style="margin-top:24px">📂 Thư mục Output</h3>
            <div class="input-group">
                <input id="cfg-output-dir" class="inp" type="text"
                    placeholder="Đường dẫn thư mục lưu dữ liệu...">
                <button class="btn sm" onclick="pickOutputDir()">📂 Chọn</button>
                <button class="btn sm primary" onclick="saveOutputDir()">💾 Lưu</button>
            </div>
            <div id="output-dir-status" class="muted" style="margin-top:4px;font-size:12px"></div>
            <div class="muted" style="margin-top:6px;font-size:11px;line-height:1.5">
                📁 Tự động tạo: <strong>Content</strong> · <strong>Remix Content</strong> · <strong>File P2P</strong>
            </div>
            <div class="muted" style="margin-top:18px;font-size:12px">
                App mở Google Chrome ở chế độ <strong>Guest</strong>. Khi đóng cửa sổ trình duyệt,
                server sẽ tự dừng và app không chạy nền.
            </div>
        </div>
    </div>
</section>
