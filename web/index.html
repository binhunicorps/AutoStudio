<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Studio</title>
    <meta name="description" content="AI-powered content writing and video prompt generation studio">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <meta name="theme-color" content="#071e3d">
    <link rel="icon" type="image/png" href="/IconLogo.png?v=20260311">
    <link rel="shortcut icon" href="/IconLogo.png?v=20260311">
    <link rel="icon" type="image/png" sizes="32x32" href="/IconLogo.png?v=20260311">
    <link rel="apple-touch-icon" sizes="180x180" href="/IconLogo.png?v=20260311">
    <link rel="icon" type="image/png" sizes="192x192" href="/IconLogo.png?v=20260311">
    <link rel="icon" type="image/png" sizes="512x512" href="/IconLogo.png?v=20260311">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>

<body>
    <!-- ═══════ Sidebar ═══════ -->
    <nav id="sidebar">
        <div class="logo">
            <img src="/Logo.png" alt="Auto Studio" class="logo-img">
        </div>
        <div class="nav-items">
            <button class="nav-btn active" data-page="writer" id="nav-writer">
                <span class="nav-icon">✍</span><span>Tạo Content</span>
            </button>
            <button class="nav-btn" data-page="remix" id="nav-remix">
                <span class="nav-icon">🔄</span><span>Remix Content</span>
            </button>
            <button class="nav-btn" data-page="queue" id="nav-queue">
                <span class="nav-icon">📋</span><span>Hàng Chờ</span>
            </button>
            <button class="nav-btn" data-page="projects" id="nav-projects">
                <span class="nav-icon">📁</span><span>Projects</span>
            </button>
            <button class="nav-btn" data-page="p2p" id="nav-p2p">
                <span class="nav-icon">&#8646;</span><span>Gửi File P2P</span>
            </button>
            <button class="nav-btn" data-page="prompts" id="nav-prompts">
                <span class="nav-icon">📝</span><span>Quản Lý Prompt</span>
            </button>
        </div>
        <div class="nav-bottom">
            <button class="nav-btn" data-page="settings" id="nav-settings">
                <span class="nav-icon">⚙</span><span>Cấu Hình</span>
            </button>
            <button class="nav-btn" data-page="guide" id="nav-guide">
                <span class="nav-icon">📘</span><span>Hướng Dẫn</span>
            </button>
        </div>
        <div class="sidebar-footer">
            <div class="sidebar-version sidebar-label" id="sidebar-version">v... @hvbinh73</div>
        </div>
    </nav>

    <!-- ═══════ Main Content (pages loaded dynamically) ═══════ -->
    <main id="content"></main>

    <!-- ═══════ Log Panel ═══════ -->
    <aside id="log-panel">
        <div class="log-head">
            <span>📋 Log</span>
            <button class="btn sm" onclick="clearLog()">Clear</button>
        </div>
        <div id="log-tools" class="log-tools">
            <div class="log-tools-title">Công Cụ</div>
            <div class="log-tools-grid">
                <button class="btn sm" onclick="copyContent()" title="Copy dữ liệu tab hiện tại">📋 Copy</button>
                <button class="btn sm" onclick="clearResults()" title="Làm mới dữ liệu">✕ Làm Mới</button>
                <button class="btn sm dark" onclick="importProject()" title="Import project">📂 Import</button>
            </div>
        </div>
        <div id="log-body" class="log-body"></div>
    </aside>

    <!-- ═══════ Modal (shared) ═══════ -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-head">
                <h3 id="modal-title"></h3>
                <div class="modal-head-actions">
                    <button id="btn-modal-translate" class="btn sm" onclick="translateModalToVietnamese()"
                        title="Dịch nội dung sang tiếng Việt">🌐 Dịch VI</button>
                    <button class="btn sm" onclick="closeModal()">✕</button>
                </div>
            </div>
            <textarea id="modal-text" class="modal-body"></textarea>
            <div class="modal-foot">
                <button class="btn sm" onclick="copyModal()">📋 Copy</button>
                <button id="btn-modal-save" class="btn sm primary" onclick="updateModalContent()" disabled>Cập
                    Nhật</button>
            </div>
        </div>
    </div>

    <div id="edit-confirm-overlay" class="modal-overlay" onclick="cancelEditConfirm()">
        <div class="modal confirm-modal" onclick="event.stopPropagation()">
            <div class="modal-head">
                <h3 id="edit-confirm-title">Xác nhận cập nhật</h3>
            </div>
            <div class="confirm-body">
                <div id="edit-confirm-summary" class="confirm-summary"></div>
                <div id="edit-confirm-diff-list" class="confirm-diff-list"></div>
            </div>
            <div class="modal-foot">
                <button id="btn-edit-confirm-ok" class="btn sm primary" onclick="confirmEditConfirm()">Xác nhận</button>
                <button id="btn-edit-confirm-cancel" class="btn sm" onclick="cancelEditConfirm()">Huỷ</button>
            </div>
        </div>
    </div>

    <!-- ═══════ Style Dialog ═══════ -->
    <div id="style-dialog-overlay" class="modal-overlay" onclick="closeStyleDialog()">
        <div class="modal style-dialog" onclick="event.stopPropagation()">
            <div class="modal-head">
                <h3 id="sd-title">Thêm Style</h3>
                <div class="modal-head-actions">
                    <button id="btn-sd-translate" class="btn sm" onclick="translateStylePromptToVietnamese()"
                        title="Dịch nội dung prompt sang tiếng Việt">🌐 Dịch VI</button>
                    <button class="btn sm" onclick="closeStyleDialog()">✕</button>
                </div>
            </div>
            <div class="sd-body">
                <label class="field-label">Tên Style</label>
                <input id="sd-name" class="inp" type="text" placeholder="VD: Cinematic, Thông thường...">
                <label class="field-label">Prompt</label>
                <textarea id="sd-prompt" class="inp" rows="5" placeholder="Mô tả phong cách..."></textarea>
                <div id="sd-duration-group">
                    <label class="field-label">Thời lượng (phút) <span class="muted">(chỉ Content Style)</span></label>
                    <input id="sd-duration" class="inp" type="number" value="0" min="0" max="120">
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn primary" onclick="saveStyleDialog()">💾 Lưu</button>
                <button class="btn" onclick="closeStyleDialog()" style="margin-left:6px;">Hủy</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-import" accept=".json" style="display:none" onchange="handleImport(event)">
    <script src="app.js"></script>
    <script>
        // Load page partials into #content
        (async function loadPages() {
            const pages = ["writer", "remix", "prompts", "queue", "projects", "p2p", "settings", "guide"];
            const container = document.getElementById("content");
            const frags = await Promise.all(pages.map(p =>
                fetch(`/pages/${p}.html`).then(r => r.text()).catch(() => `<section id="page-${p}" class="page"><div class="tbl-empty">Lỗi tải trang ${p}</div></section>`)
            ));
            container.innerHTML = frags.join("\n");
            if (typeof onPagesLoaded === "function") onPagesLoaded();
        })();
    </script>
</body>

</html>
